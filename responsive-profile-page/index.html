<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="profile">
      <p class="eyebrow">Software Engineering Student</p>
      <h1>Hi, I'm vertebra106.</h1>
      <p class="intro">
        I am learning frontend development step by step, starting with HTML,
        CSS, and JavaScript.
      </p>
      <button id="themeButton" type="button">Switch Theme</button>
    </section>

    <section class="panel" aria-labelledby="skills-title">
      <h2 id="skills-title">Current Focus</h2>
      <ul>
        <li>Semantic HTML</li>
        <li>Responsive CSS layout</li>
        <li>Basic JavaScript interaction</li>
        <li>Git and GitHub workflow</li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
